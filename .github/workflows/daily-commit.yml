name: Daily commit

on:
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update daily marker
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%d %H:%M UTC" > .github/last-active.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-active.txt
          git diff --staged --quiet || git commit -m "chore: daily activity marker"
          git push
