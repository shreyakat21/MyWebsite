<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600">
  <rect width="860" height="600" fill="#ffffff"/>

  <!-- top header placeholder -->
  <rect x="0" y="0" width="860" height="90" fill="#d9d9d9"/>
  <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#8a8a8a">search patient</text>

  <!-- sidebar -->
  <rect x="0" y="90" width="110" height="510" fill="#d9d9d9"/>

  <!-- main panel -->
  <rect x="130" y="112" width="690" height="468" rx="6" fill="#ffffff" stroke="#e0e0e0"/>

  <!-- search bar -->
  <rect x="150" y="150" width="480" height="46" rx="23" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="172" y="178" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#555">Search Patients</text>

  <!-- add new patient button -->
  <rect x="655" y="150" width="145" height="46" rx="23" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="677" y="178" font-family="system-ui, sans-serif" font-size="13" fill="#1a1a1a">Add New Patient</text>

  <!-- table header -->
  <rect x="150" y="214" width="650" height="52" rx="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="168" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Name</text>
  <text x="252" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Patient ID</text>
  <text x="350" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Contact Info</text>
  <text x="452" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Birthday</text>
  <text x="530" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Last Physician Seen</text>
  <text x="655" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Condition</text>
  <text x="742" y="245" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a1a1a">Action</text>

  <!-- rows -->
  <rect x="150" y="290" width="650" height="44" fill="#dcdcdc"/>
  <rect x="150" y="346" width="650" height="44" fill="#dcdcdc"/>
  <rect x="150" y="402" width="650" height="44" fill="#dcdcdc"/>
  <rect x="150" y="468" width="650" height="44" fill="#dcdcdc"/>
  <rect x="150" y="524" width="650" height="44" fill="#dcdcdc"/>
</svg>
